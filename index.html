<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學院行政管理系統內部入口網</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-base-200 min-h-screen flex flex-col justify-between text-base-content">

    <div class="container mx-auto max-w-4xl px-4 py-16 flex-grow flex flex-col justify-center">
        
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-primary sm:text-5xl mb-4">
                🏫 學院行政自動化系統
            </h1>
            <p class="text-lg text-gray-500">
                歡迎使用行政管理平台，請選擇您需要操作的系統子模組。
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="card bg-base-100 shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 border border-base-300">
                <div class="card-body items-center text-center">
                    <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center text-3xl mb-2">
                        🗓️
                    </div>
                    <h2 class="card-title text-xl">智能排課系統</h2>
                    <p class="text-sm text-gray-500 min-h-[48px]">管理教師課程、教室分配以及生成自動化課表排程。</p>
                    <div class="card-actions w-full mt-4">
                        <a href="Scheduling/" class="btn btn-primary btn-block text-white">進入系統</a>
                    </div>
                </div>
            </div>

            <div class="card bg-base-100 shadow-xl hover:shadow-2xl transition-all duration-300 hover:-translate-y-1 border border-base-300">
                <div class="card-body items-center text-center">
                    <div class="w-16 h-16 bg-accent/10 text-accent rounded-full flex items-center justify-center text-3xl mb-2">
                        🇲🇴
                    </div>
                    <h2 class="card-title text-xl">研究生逗留天數統計</h2>
                    <p class="text-sm text-gray-500 min-h-[48px]">批量解析學生出入境紀錄 PDF，自動比對假期並計算留服認證天數。</p>
                    <div class="card-actions w-full mt-4">
                        <a href="travelrecord/" class="btn btn-accent btn-block text-white">進入系統</a>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <footer class="footer footer-center p-4 bg-base-300 text-base-content text-xs">
        <aside>
            <p>🛡️ 內部行政系統｜所有數據均在瀏覽器本地前端處理，不會上傳至任何外網伺服器，確保資訊安全。</p>
        </aside>
    </footer>

</body>
</html>
